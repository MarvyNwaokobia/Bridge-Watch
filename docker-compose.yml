version: "3.8"

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: bridge-watch-postgres
    environment:
      POSTGRES_DB: bridge_watch
      POSTGRES_USER: bridge_watch
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bridge_watch_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bridge_watch"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bridge-watch-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bridge-watch-backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: bridge_watch
      POSTGRES_USER: bridge_watch
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bridge_watch_dev}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${PORT:-3001}:3001"
      - "${WS_PORT:-3002}:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bridge-watch-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

volumes:
  postgres_data:
  redis_data:
